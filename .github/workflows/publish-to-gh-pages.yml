name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install
      - run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: PR Preview Instructions
        if: github.event_name == 'pull_request'
        run: |
          echo "### Run this PR build locally" >> $GITHUB_STEP_SUMMARY
          echo "1. Download and unzip the artifact to get \`artifact.tar\`." >> $GITHUB_STEP_SUMMARY
          echo "2. Run this command in your terminal:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "podman run --rm -it -p 8080:80 -v \$(pwd):/tmp docker.io/library/nginx:alpine sh -c \"mkdir /web && tar -xf /tmp/artifact.tar -C /web && cp -r /web/* /usr/share/nginx/html/ && echo 'server { listen 80; location / { root /usr/share/nginx/html; charset utf-8; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'\"" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
